{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6 my-5">
        <div class="bg-white p-5 rounded-4 shadow-sm">
            <h1 class="h2 fw-bold mb-4">Contact Us</h1>
            <p class="text-muted mb-5">Share your story or a discovery. Together, we move closer to a cure.</p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post">
                {% csrf_token %}
                
                <div class="form-floating mb-3">
                    <input type="text" name="name" class="form-control rounded-3" id="id_name" placeholder="Your Name" required>
                    <label for="id_name">Your Name</label>
                </div>
                
                <div class="form-floating mb-3">
                    <input type="email" name="email" class="form-control rounded-3" id="id_email" placeholder="Your Email" required>
                    <label for="id_email">Your Email</label>
                </div>
                
                <div class="form-floating mb-3">
                    <input type="text" name="subject" class="form-control rounded-3" id="id_subject" placeholder="Subject" required>
                    <label for="id_subject">Subject</label>
                </div>
                
                <div class="form-floating mb-4">
                    <textarea name="message" class="form-control rounded-3" id="id_message" placeholder="Your Message" style="height: 150px" required></textarea>
                    <label for="id_message">Your Message</label>
                </div>
                
                <button type="submit" class="btn btn-lg w-100 rounded-pill fw-bold text-white" style="background-color: var(--teal-accent);">
                    Send Message
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-xl w-full bg-white p-8 md:p-10 rounded-2xl shadow-sm border border-gray-100">
        <div class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-extrabold text-deep tracking-tight mb-2">Contact Us</h1>
            <p class="text-lg text-gray-500">Share your story or a discovery. Together, we move closer to a cure.</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="space-y-1">
                <label for="id_name" class="block text-sm font-semibold text-gray-700">Your Name</label>
                <input type="text" name="name" id="id_name" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm transition-colors" placeholder="Jane Doe">
            </div>

            <div class="space-y-1">
                <label for="id_email" class="block text-sm font-semibold text-gray-700">Your Email</label>
                <input type="email" name="email" id="id_email" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm transition-colors" placeholder="jane@example.com">
            </div>

            <div class="space-y-1">
                <label for="id_subject" class="block text-sm font-semibold text-gray-700">Subject</label>
                <input type="text" name="subject" id="id_subject" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm transition-colors" placeholder="How can we help?">
            </div>

            <div class="space-y-1">
                <label for="id_message" class="block text-sm font-semibold text-gray-700">Your Message</label>
                <textarea name="message" id="id_message" rows="5" required class="appearance-none block w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:ring-amber-500 focus:border-amber-500 sm:text-sm transition-colors resize-y" placeholder="Tell us more..."></textarea>
            </div>

            <div class="pt-4">
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-full shadow-sm text-base font-bold text-white bg-teal-main hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-colors">
                    Send Message
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
